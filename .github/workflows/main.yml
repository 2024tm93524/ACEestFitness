name: ACEest CI/CD Pipeline

# Trigger: run on every push or pull request to main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build & Lint
  # ─────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8 (check for syntax errors)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warning-level checks (non-blocking)
          flake8 app.py --count --max-line-length=120 --statistics --exit-zero

  # ─────────────────────────────────────────────
  # JOB 2: Run Pytest (unit tests)
  # ─────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-lint        # only run if lint job passes

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 3: Build Docker Image
  # ─────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                  # only run if tests pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:latest .

      - name: Run container health check
        run: |
          # Start container in background
          docker run -d -p 5000:5000 --name aceest-test aceest-fitness:latest
          # Wait for app to start
          sleep 5
          # Hit the health endpoint
          curl --fail http://localhost:5000/health || (docker logs aceest-test && exit 1)
          # Stop and remove container
          docker stop aceest-test
          docker rm aceest-test
