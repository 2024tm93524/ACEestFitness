<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACEest – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #eee;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #2a2a2a; border-radius: 10px; padding: 40px 36px; width: 340px; }
    h1 { color: #d4af37; text-align: center; margin-bottom: 8px; }
    p  { color: #aaa; text-align: center; font-size: 13px; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; color: #aaa; font-size: 14px; margin-top: 12px; }
    input { width: 100%; padding: 9px; background: #333; color: #eee;
            border: 1px solid #555; border-radius: 5px; }
    button { width: 100%; margin-top: 20px; padding: 10px;
             background: #d4af37; color: #000; font-weight: bold;
             border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
    button:hover { opacity: 0.85; }
    .alert { padding: 9px 14px; border-radius: 5px; margin-bottom: 14px;
             background: #4d1e1e; color: #ff9f9f; font-size: 13px; }
    .hint  { text-align: center; margin-top: 14px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🏋️ ACEest</h1>
    <p>Functional Fitness Management System</p>

    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="alert">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="{{ url_for('login') }}">
      <label>Username</label>
      <input type="text" name="username" required autofocus>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>
    <p class="hint">Default: admin / admin123</p>
  </div>
</body>
</html>
